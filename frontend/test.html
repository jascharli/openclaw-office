<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>测试页面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f0f0f0;
    }
    .success {
      color: green;
      font-size: 24px;
      font-weight: bold;
    }
    .info {
      margin-top: 20px;
      padding: 10px;
      background: #e0e0e0;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="success">✅ 测试页面加载成功！</div>
  <div class="info">
    <p>当前时间：<span id="time"></span></p>
    <p>访问地址：<span id="url"></span></p>
    <p>后端 API：<span id="api"></span></p>
  </div>
  
  <script>
    document.getElementById('time').textContent = new Date().toLocaleString();
    document.getElementById('url').textContent = window.location.href;
    
    // 测试后端 API 连接
    fetch('/api/v1/agents/tasks')
      .then(response => response.json())
      .then(data => {
        const agentCount = Object.keys(data).length;
        document.getElementById('api').textContent = '✅ 连接成功 (' + agentCount + ' 个 Agent)';
      })
      .catch(error => {
        document.getElementById('api').textContent = '❌ 连接失败: ' + error.message;
      });
  </script>
</body>
</html>
