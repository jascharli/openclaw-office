<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务交接管理 - 龙虾办公室</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; color: white; margin-bottom: 30px; }
    header h1 { font-size: 2em; margin-bottom: 10px; }
    
    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
    }
    .btn-primary { background: #667eea; color: white; }
    .btn-success { background: #48bb78; color: white; }
    .btn-danger { background: #f56565; color: white; }
    .btn-secondary { background: #a0aec0; color: white; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      font-size: 14px;
    }
    
    .handover-item {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .handover-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-accepted { background: #d1fae5; color: #065f46; }
    .status-completed { background: #dbeafe; color: #1e40af; }
    .status-rejected { background: #fee2e2; color: #991b1b; }
    
    .agent-arrow {
      display: inline-block;
      margin: 0 10px;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <header>
        <h1>🔄 任务交接管理</h1>
        <p>AI 团队工作空间 - 任务交接与协作</p>
      </header>
      
      <!-- 创建交接卡片 -->
      <div class="card">
        <h2 style="margin-bottom: 15px;">📝 创建交接</h2>
        <div class="form-group">
          <label>任务 ID</label>
          <input v-model="newHandover.task_id" placeholder="task-001">
        </div>
        <div class="form-group">
          <label>任务名称</label>
          <input v-model="newHandover.task_name" placeholder="API 开发">
        </div>
        <div class="form-group">
          <label>交出方 Agent</label>
          <select v-model="newHandover.from_agent_id">
            <option value="dev-claw">dev-claw</option>
            <option value="main">大白 AI</option>
            <option value="work-claw">work-claw</option>
          </select>
        </div>
        <div class="form-group">
          <label>接收方 Agent</label>
          <select v-model="newHandover.to_agent_id">
            <option value="work-claw">work-claw</option>
            <option value="dev-claw">dev-claw</option>
            <option value="main">大白 AI</option>
          </select>
        </div>
        <div class="form-group">
          <label>交接类型</label>
          <select v-model="newHandover.handover_type">
            <option value="full">完整交接</option>
            <option value="partial">部分交接</option>
            <option value="collaboration">协作模式</option>
          </select>
        </div>
        <div class="form-group">
          <label>交接说明</label>
          <textarea v-model="newHandover.notes" rows="3" placeholder="请说明交接内容和注意事项"></textarea>
        </div>
        <button class="btn btn-primary" @click="createHandover">创建交接</button>
      </div>
      
      <!-- 交接列表 -->
      <div class="card">
        <h2 style="margin-bottom: 15px;">📋 交接列表</h2>
        <div style="margin-bottom: 15px;">
          <button class="btn btn-secondary" :class="{active: filterStatus==''}" @click="filterStatus=''">全部</button>
          <button class="btn btn-secondary" :class="{active: filterStatus=='pending'}" @click="filterStatus='pending'">待处理</button>
          <button class="btn btn-secondary" :class="{active: filterStatus=='accepted'}" @click="filterStatus='accepted'">已接受</button>
          <button class="btn btn-secondary" :class="{active: filterStatus=='completed'}" @click="filterStatus='completed'">已完成</button>
        </div>
        
        <div v-if="handovers.length === 0" style="text-align: center; padding: 40px; color: #a0aec0;">
          暂无交接记录
        </div>
        
        <div v-for="handover in filteredHandovers" :key="handover.id" class="handover-item">
          <div class="handover-header">
            <div>
              <strong>{{ handover.task_name }}</strong>
              <span class="status-badge" :class="'status-' + handover.status">{{ statusText(handover.status) }}</span>
            </div>
            <div style="font-size: 12px; color: #a0aec0;">
              {{ formatDate(handover.created_at) }}
            </div>
          </div>
          
          <div style="margin: 10px 0;">
            <strong>{{ getAgentName(handover.from_agent_id) }}</strong>
            <span class="agent-arrow">→</span>
            <strong>{{ getAgentName(handover.to_agent_id) }}</strong>
          </div>
          
          <div style="font-size: 14px; color: #4a5568; margin: 10px 0;">
            {{ handover.notes || '无备注' }}
          </div>
          
          <div v-if="handover.status === 'pending'" style="margin-top: 10px;">
            <button class="btn btn-success" @click="acceptHandover(handover.handover_id)">✅ 接受</button>
            <button class="btn btn-danger" @click="rejectHandover(handover.handover_id)">❌ 拒绝</button>
          </div>
          
          <div v-if="handover.status === 'accepted'" style="margin-top: 10px;">
            <button class="btn btn-primary" @click="completeHandover(handover.handover_id)">✅ 完成</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="config.js"></script>
  <script>
    const API = window.LOBSTER_CONFIG;
    
    const { createApp } = Vue;
    
    createApp({
      data() {
        return {
          newHandover: {
            task_id: '',
            task_name: '',
            from_agent_id: 'dev-claw',
            to_agent_id: 'work-claw',
            handover_type: 'full',
            notes: ''
          },
          handovers: [],
          filterStatus: ''
        }
      },
      computed: {
        filteredHandovers() {
          if (!this.filterStatus) return this.handovers;
          return this.handovers.filter(h => h.status === this.filterStatus);
        }
      },
      methods: {
        async fetchHandovers() {
          try {
            const res = await fetch(API.getApiUrl('/handovers'));
            const data = await res.json();
            this.handovers = data.handovers || [];
          } catch (err) {
            console.error('获取交接列表失败:', err);
          }
        },
        async createHandover() {
          try {
            const res = await fetch(API.getApiUrl('/handovers'), {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify(this.newHandover)
            });
            const result = await res.json();
            if (result.success) {
              alert('✅ 交接创建成功');
              this.newHandover = {
                task_id: '',
                task_name: '',
                from_agent_id: 'dev-claw',
                to_agent_id: 'work-claw',
                handover_type: 'full',
                notes: ''
              };
              this.fetchHandovers();
            }
          } catch (err) {
            alert('❌ 创建失败：' + err.message);
          }
        },
        async acceptHandover(handover_id) {
          try {
            const res = await fetch(API.getApiUrl(`/handovers/${handover_id}/accept`), {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({message: '收到，我会继续完成'})
            });
            const result = await res.json();
            if (result.success) {
              alert('✅ 已接受交接');
              this.fetchHandovers();
            }
          } catch (err) {
            alert('❌ 接受失败：' + err.message);
          }
        },
        async rejectHandover(handover_id) {
          const reason = prompt('请输入拒绝原因:');
          if (!reason) return;
          
          try {
            const res = await fetch(API.getApiUrl(`/handovers/${handover_id}/reject`), {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({reason})
            });
            const result = await res.json();
            if (result.success) {
              alert('✅ 已拒绝交接');
              this.fetchHandovers();
            }
          } catch (err) {
            alert('❌ 拒绝失败：' + err.message);
          }
        },
        async completeHandover(handover_id) {
          const summary = prompt('请输入完成总结:');
          if (!summary) return;
          
          try {
            const res = await fetch(API.getApiUrl(`/handovers/${handover_id}/complete`), {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({summary})
            });
            const result = await res.json();
            if (result.success) {
              alert('✅ 交接已完成');
              this.fetchHandovers();
            }
          } catch (err) {
            alert('❌ 完成失败：' + err.message);
          }
        },
        statusText(status) {
          const map = {
            'pending': '待处理',
            'accepted': '已接受',
            'completed': '已完成',
            'rejected': '已拒绝'
          };
          return map[status] || status;
        },
        getAgentName(agent_id) {
          const map = {
            'dev-claw': 'dev-claw',
            'main': '大白 AI',
            'work-claw': 'work-claw'
          };
          return map[agent_id] || agent_id;
        },
        formatDate(isoString) {
          if (!isoString) return '-';
          return new Date(isoString).toLocaleString('zh-CN');
        }
      },
      mounted() {
        this.fetchHandovers();
        // 每 30 秒刷新一次
        setInterval(() => this.fetchHandovers(), 30000);
      }
    }).mount('#app');
  </script>
</body>
</html>
