[pytest]
markers =
    regression: Mark regression tests
    p0: Mark P0 priority tests
    p1: Mark P1 priority tests
    p2: Mark P2 priority tests
    smoke: Mark smoke tests
    api: Mark API tests
    frontend: Mark frontend tests
    integration: Mark integration tests
    security: Mark security tests
    config: Mark config management tests
    boundary: Mark boundary value tests
    exception: Mark exception scenario tests
    reminder: Mark reminder function tests
testpaths = scripts
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
